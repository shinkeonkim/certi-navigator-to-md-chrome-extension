<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Certi to Markdown</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 250px;
      padding: 16px;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: center;
      align-items: center;
      background-color: #f9f9f9;
    }
    h1 {
      font-size: 16px;
      margin: 0;
      color: #333;
      text-align: center;
    }
    button {
      background-color: #0f172a;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #334155;
    }
    #status {
      font-size: 12px;
      color: #16a34a;
      display: none;
      text-align: center;
    }
    #error {
      font-size: 12px;
      color: #dc2626;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Certi to Markdown</h1>
  <button id="downloadBtn">Markdown으로 다운로드</button>
  <div id="status">다운로드 완료!</div>
  <div id="error">해당 페이지에서 실행할 수 없거나 오류가 발생했습니다.</div>
  <script src="popup.js"></script>
</body>
</html>
