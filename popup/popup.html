<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Certi to Markdown</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
      align-items: center;
      background-color: #f9f9f9;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 4px;
      color: #333;
      text-align: center;
    }
    button {
      background-color: #0f172a;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #334155;
    }
    button:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    button.secondary {
      background-color: #2563eb;
    }
    button.secondary:hover {
      background-color: #1d4ed8;
    }
    #status {
      font-size: 12px;
      color: #16a34a;
      display: none;
      text-align: center;
      min-height: 16px;
    }
    #error {
      font-size: 12px;
      color: #dc2626;
      display: none;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>Certi to Markdown</h1>
  <button id="downloadBtn">Markdown으로 다운로드</button>
  <button id="copyBtn" class="secondary">클립보드에 복사</button>
  <div id="status" role="status" aria-live="polite"></div>
  <div id="error" role="alert" aria-live="assertive"></div>
  <script src="popup.js"></script>
</body>
</html>
