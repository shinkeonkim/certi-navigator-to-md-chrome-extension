<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Certi to Markdown</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 280px;
      padding: 16px;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
      align-items: stretch;
      background-color: #f9f9f9;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 4px;
      color: #333;
      text-align: center;
    }
    button {
      background-color: #0f172a;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      transition: background-color 0.2s, color 0.2s;
    }
    button:hover {
      background-color: #334155;
    }
    button:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    button.secondary {
      background-color: #2563eb;
    }
    button.secondary:hover {
      background-color: #1d4ed8;
    }
    button.success {
      background-color: #16a34a;
    }
    button.success:hover {
      background-color: #15803d;
    }
    button.ghost {
      background-color: transparent;
      color: #0f172a;
      border: 1px solid #cbd5e1;
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 500;
    }
    button.ghost:hover {
      background-color: #f1f5f9;
    }
    button.ghost.danger {
      color: #dc2626;
      border-color: #fecaca;
    }
    button.ghost.danger:hover {
      background-color: #fef2f2;
    }
    .filename-row {
      display: flex;
      align-items: stretch;
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .filename-row:focus-within {
      border-color: #2563eb;
    }
    .filename-row input {
      flex: 1;
      border: none;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      background: transparent;
      color: #0f172a;
      min-width: 0;
    }
    .filename-row input:focus {
      outline: none;
    }
    .filename-row input:disabled {
      background: #f8fafc;
      color: #94a3b8;
      cursor: not-allowed;
    }
    .filename-row input::placeholder {
      color: #94a3b8;
    }
    .filename-suffix {
      display: flex;
      align-items: center;
      padding: 0 10px;
      background: #f1f5f9;
      color: #64748b;
      font-size: 12px;
      font-family: ui-monospace, "SF Mono", Monaco, "Cascadia Mono", monospace;
      border-left: 1px solid #e5e7eb;
    }
    .divider {
      height: 1px;
      background-color: #e5e7eb;
      margin: 4px 0;
    }
    .settings {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .settings-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .folder-name {
      font-size: 12px;
      color: #0f172a;
      background: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
      word-break: break-all;
    }
    .folder-name.unset {
      color: #94a3b8;
      font-style: italic;
    }
    .settings-actions {
      display: flex;
      gap: 6px;
    }
    .settings-actions button {
      flex: 1;
    }
    #status {
      font-size: 12px;
      color: #16a34a;
      display: none;
      text-align: center;
      min-height: 16px;
      word-break: break-all;
    }
    #error {
      font-size: 12px;
      color: #dc2626;
      display: none;
      text-align: center;
      min-height: 16px;
      word-break: break-all;
    }
    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <h1>Certi to Markdown</h1>

  <div class="filename-row">
    <input
      id="filenameInput"
      type="text"
      placeholder="파일명 (비우면 자동 생성)"
      autocomplete="off"
      spellcheck="false"
      aria-label="파일명 (선택사항, 비우면 문제 제목으로 자동 생성됩니다. 클립보드 복사에는 적용되지 않습니다.)"
    />
    <span class="filename-suffix">.md</span>
  </div>

  <button id="downloadBtn">Markdown으로 다운로드</button>
  <button id="copyBtn" class="secondary">클립보드에 복사</button>
  <button id="saveToFolderBtn" class="success">폴더에 저장</button>

  <div class="divider"></div>

  <div class="settings">
    <div class="settings-label">저장 폴더</div>
    <div id="folderName" class="folder-name unset">설정 안 됨</div>
    <div class="settings-actions">
      <button id="pickFolderBtn" class="ghost">폴더 선택</button>
      <button id="clearFolderBtn" class="ghost danger" hidden>해제</button>
    </div>
  </div>

  <div id="status" role="status" aria-live="polite"></div>
  <div id="error" role="alert" aria-live="assertive"></div>

  <script src="popup.js"></script>
</body>
</html>
